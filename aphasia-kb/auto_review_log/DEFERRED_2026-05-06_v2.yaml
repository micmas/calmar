# auto_review.py worksheet
#
# For each draft below, fill in:
#   verdict:   approve | agree_defer | reject
#   rationale: 1-3 sentences explaining the call
#   per_finding (optional): list of {id, concern, supports_approval}
#
# Then apply with:
#   python auto_review.py --apply-verdicts <this-file>
#
# Notes:
#   - 'approve' on a deferred draft lifts to auto_approve and promotes via promote.py.
#   - 'reject' marks as auto_reject (the draft stays in drafts/).
#   - 'agree_defer' keeps it deferred (still needs human attention).
#   - schema_valid / pdf_quote_match failures CANNOT be overridden.

drafts:
- draft: drafts/impairments/syntactic_processing__DenOuden2019.md
  current_verdict: defer_to_human
  failure_reasons:
  - '(skipped) pdf_quote_match: no PDFs available in /sessions/youthful-affectionate-cray/mnt/aphasia-lesion-pipeline/aphasia-kb/papers
    for any cited paper'
  - '(sft) all_findings_confidence_high: f3: confidence=''medium'''
  - '(sft) strength_moderate_or_better: f3: strength=''weak'''
  findings_summary:
  - id: f1
    target: morphosyntactic_production_deficit
    claim: Lesions to the left IFG pars triangularis (BA 45) predict morphosyntactically reduced speech
      output (agrammatic production) after left-hemisphere stroke.
    strength: moderate
    confidence: high
    flags:
    - USC/MUSC cohort (n=71); overlaps with @Fridriksson2018, @Yourganov2015Predicting, @Basilakos2015
      (same lab)
    - PD-MR classification based on single speech sample (Cookie-Theft) — limited ecological validity
    - CLSM results not corrected for lesion size; treated as supplementary evidence
    claim_quotes:
    - page: 17
      quote: identification of morphosyntactic production problems in descriptive speech was most strongly
        predicted by structural lesions in the triangular part of the IFG
  - id: f2
    target: verb_argument_structure_production
    claim: Lesions to the left posterior superior temporal gyrus (pSTG) and angular gyrus predict impaired
      verb argument structure production on the NAVS ASPT-A subtest.
    strength: moderate
    confidence: high
    flags:
    - USC/MUSC cohort; overlaps with other USC papers
    - Angular gyrus result may reflect semantic-syntactic interface rather than pure syntax
    claim_quotes:
    - page: 12
      quote: ASPT-A scores were negatively correlated with damage to the angular gyrus, extending into
        middle occipital gyrus
    - page: 18
      quote: location of this region makes a lot of sense. If "syntactic processing" is not exclusively
        a function of the dorsal stream
  - id: f3
    target: sentence_comprehension_production
    claim: Reduced structural connectivity in a ventral pathway between left IFG and temporal regions
      (especially IFG-pars-triangularis to pSTG/MTG) predicts impaired noncanonical sentence production
      on the NAVS SPPT.
    strength: weak
    confidence: medium
    flags:
    - USC/MUSC cohort; overlaps with other USC papers
    - CLSM results not corrected for lesion size — lower reliability than VLSM findings
    - Ventral stream connectivity finding is unexpected given prior literature emphasizing dorsal stream
    claim_quotes:
    - page: 18
      quote: preserved noncanonical sentence production on this priming task was strongly reliant on the
        integrity of ventral-stream connections to IFG
  verdict: null
  rationale: null
  per_finding: null
