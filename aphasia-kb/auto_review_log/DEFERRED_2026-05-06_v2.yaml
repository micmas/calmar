- draft: drafts/regions/left_anterior_temporal_lobe__Robson2014.md
  current_verdict: defer_to_human
  failure_reasons:
  - '(skipped) pdf_quote_match: no PDFs available in /sessions/youthful-affectionate-cray/mnt/aphasia-lesion-pipeline/aphasia-kb/papers
    for any cited paper'
  - '(sft) all_findings_confidence_high: f2: confidence=''medium'''
  - '(sft) strength_moderate_or_better: f2: strength=''weak'''
  findings_summary:
  - id: f1
    target: semantic_comprehension_residual
    claim: In chronic Wernicke's aphasia (left posterior temporoparietal lesions), the left anterior temporal
      lobe — including the anterior fusiform gyrus, temporal pole, and anterior middle temporal gyrus
      — shows significantly greater activation than
    strength: moderate
    confidence: high
    flags:
    - Whole-brain threshold p<0.005 uncorrected — not corrected for multiple comparisons; interpret with
      caution.
    - ROI results are one-tailed one-sample t-tests (significance of activation within group) — not a
      between-group test for the activation itself.
    - Spin-echo EPI used specifically to enable ATL coverage — results may differ with gradient-echo sequences
      (usual limitation of ATL fMRI).
    - Five participants < 1 year post-stroke — some may not represent stable chronic state.
    - Overactivation interpretation is theory-laden; alternative account (de-inhibition) is not ruled
      out.
    claim_quotes:
    - page: 1
      quote: Wernicke's aphasia group displayed an 'over-activation' in comparison with control participants,
        indicating that anterior temporal lobe regions become increasingly influential following reduction
        in posterior semantic resources
    - page: 6
      quote: main effect of group was reflected in significantly greater activation in the Wernicke's
        aphasia group than the control group throughout the ventral and middle temporal lobes
    - page: 10
      quote: activation increased in the anterior temporal lobe and other regions following lesions to
        posterior temporal regions classically associated with semantic representation access
    - page: 12
      quote: patients' reduction in posterior temporal semantic and phonological processing resources
        increased reliance on extra-sylvian temporal regions
  - id: f2
    target: right_anterior_superior_temporal_gyrus
    claim: Written word semantic processing in Wernicke's aphasia — but not picture processing — additionally
      recruits the right anterior superior temporal gyrus and sulcus, a region associated with recovery
      from auditory-verbal comprehension impairme
    strength: weak
    confidence: medium
    flags:
    - Modality-specific effect (words only, not pictures) is theoretically interesting but based on a
      single ROI t-test; needs replication.
    - No Group × Condition interaction at whole-brain level despite hypothesis; ROI finding may not generalise.
    claim_quotes:
    - page: 8
      quote: Wernicke's aphasia group displayed additional activation in the right anterior superior temporal
        gyrus/sulcus for word stimuli [t(11) = 2.27, P = 0.022]
    - page: 10
      quote: importance of the right anterior superior temporal gyrus/sulcus in language comprehension
        subsequent to left posterior temporal lesions has been demonstrated in previous studies
    - page: 1
      quote: Semantic processing of written words in Wernicke's aphasia was additionally supported by
        recruitment of the right anterior superior temporal lobe, a region previously associated with
        recovery from auditory-verbal comprehension impairments
  verdict: null
  rationale: null
  per_finding: null
- draft: drafts/regions/left_precentral_gyrus__Itabashi2015.md
  current_verdict: defer_to_human
  failure_reasons:
  - '(skipped) pdf_quote_match: no PDFs available in /sessions/youthful-affectionate-cray/mnt/aphasia-lesion-pipeline/aphasia-kb/papers
    for any cited paper'
  - '(sft) all_findings_confidence_high: f2: confidence=''medium'''
  findings_summary:
  - id: f1
    target: apraxia_of_speech
    claim: Damage to the posterior wall of the left precentral gyrus (central sulcus face area) is the
      critical lesion site for AOS in acute ischemic stroke, particularly for pure AOS without accompanying
      aphasia.
    strength: moderate
    confidence: high
    flags:
    - Japanese-speaking cohort; acute/subacute phase (median 7 days); no cohort overlap with USC papers
    - Qualitative AOS assessment only; no standardized rating scale (unlike Basilakos 2015)
    - Independent replication of Basilakos (2015) left precentral gyrus finding
    claim_quotes:
    - page: 3
      quote: regions associated with all AOS were centered on the posterior wall of the left precentral
        gyrus in the central sulcus
    - page: 3
      quote: posterior wall of the left precentral gyrus predicted the presence of AOS in the comparison
        between pure AOS and non-AOS
    - page: 4
      quote: regions associated with pure AOS were confined to the left precentral gyrus in the VLSM analysis
  - id: f2
    target: apraxia_of_speech_with_aphasia
    claim: AOS co-occurring with aphasia (AOS-aphasia) is associated with more widespread subcortical
      lesions (basal ganglia, corona radiata, centrum semiovale) in addition to precentral gyrus damage,
      reflecting larger total lesion burden.
    strength: moderate
    confidence: medium
    flags:
    - AOS+aphasia finding reflects lesion size confound; interpret with caution
    - Subcortical involvement may indicate white matter pathway disruption rather than grey matter specificity
    claim_quotes:
    - page: 4
      quote: AOS-aphasia and non-AOS indicated scattered lesions, including the basal ganglia, corona
        radiata
    - page: 4
      quote: patients who have both AOS and aphasia tend to have larger size of lesions and greater involvement
        of subcortical structures
  verdict: null
  rationale: null
  per_finding: null
- draft: drafts/regions/left_superior_temporal_gyrus__Leff2009.md
  current_verdict: defer_to_human
  failure_reasons:
