    target: right_pars_triangularis_ba45
    claim: Inhibitory 1 Hz rTMS applied daily for 10 days (1200 pulses/day at 90% motor threshold) to
      the right pars triangularis (anterior Broca homologue, immediately rostral to the ascending ramus
      of the Sylvian fissure) produces significant lastin
    strength: weak
