  - '(skipped) pdf_quote_match: no PDFs available in /sessions/youthful-affectionate-cray/mnt/aphasia-lesion-pipeline/aphasia-kb/papers
    for any cited paper'
  findings_summary:
  - id: f1
    target: auditory_short_term_memory_capacity
    claim: Structural integrity of a focal region of the left posterior superior temporal gyrus and sulcus,
      lateral and posterior to Heschl's gyrus and overlapping with the inferior planum temporale, is causally
      necessary for auditory short-term memor
    strength: strong
    confidence: high
    flags:
    - Scanner was 1.5T; reference space reported as MNI but method uses unified segmentation — likely
      MNI305 (SPM5 default).
    - Analysis 1 STG peak is listed as Z=Inf in Table 1, indicating saturation; actual Z not recoverable
      from paper.
    - All analyses used SPM5 VBM on continuous grey matter images, NOT binary lesion maps — methodology
      distinct from VLSM studies.
    claim_quotes:
    - page: 1
      quote: structural integrity of a posterior region of the superior temporal gyrus and sulcus predicted
        auditory short-term memory capacity
    - page: 6
      quote: identified a cortical region where grey matter density covaried with digit span despite the
        inclusion of these five extra control regressors
  - id: f2
    target: spoken_sentence_comprehension
    claim: Structural integrity of the left posterior superior temporal gyrus (same region supporting
      auditory STM capacity) also predicts spoken sentence comprehension ability, but NOT single spoken
      word comprehension or written sentence comprehensio
    strength: moderate
    confidence: high
    flags:
    - Correlation r=0.22 is statistically significant but modest; effect size is smaller than the primary
      digit-span finding.
    - Dissociation from written sentence comprehension (r=0.05, ns) is a key theoretical claim — supports
      auditory-specific storage.
    claim_quotes:
    - page: 6
      quote: significant correlation between the structural integrity of this region and spoken sentence
        comprehension score, r(199) = 0.22, P = 0.002
    - page: 6
      quote: grey matter density in a region important for auditory short-term memory capacity correlated
        more strongly with comprehension of spoken sentences than with comprehension of either single
        words or written sentences
    - page: 9
      quote: identified the left posterior superior temporal gyrus and sulcus as the substrate mediating
        the capacity of auditory short-term memory
  verdict: null
  rationale: null
  per_finding: null
