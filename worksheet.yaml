# auto_review.py worksheet
#
# For each draft below, fill in:
#   verdict:   approve | agree_defer | reject
#   rationale: 1-3 sentences explaining the call
#   per_finding (optional): list of {id, concern, supports_approval}
#
# Then apply with:
#   python auto_review.py --apply-verdicts <this-file>
#
# Notes:
#   - 'approve' on a deferred draft lifts to auto_approve and promotes via promote.py.
#   - 'reject' marks as auto_reject (the draft stays in drafts/).
#   - 'agree_defer' keeps it deferred (still needs human attention).
#   - schema_valid / pdf_quote_match failures CANNOT be overridden.

drafts:
- draft: drafts/impairments/conduction_aphasia__Yourganov2015Predicting.md
  current_verdict: defer_to_human
  failure_reasons:
  - '(skipped) pdf_quote_match: no PDFs available in /Users/Michele/neurodesktop-storage/aphasia-lesion-pipeline/aphasia-kb/papers
    for any cited paper'
  - '(sft) strength_moderate_or_better: f3: strength=''weak'''
  findings_summary:
  - id: f1
    target: left_posterior_arcuate_fasciculus
    claim: Damage to the posterior segment of the left arcuate fasciculus is the strongest predictor of
      conduction aphasia in a multivariate SVM classification of 98 chronic stroke aphasia patients (predictive
      relevance Z = 2.48).
    strength: strong
    confidence: high
    flags:
    - cohort overlaps with @Fridriksson2018 (same USC registry); flag for downstream double-counting risk
      in interpret_overlap().
    claim_quotes:
    - page: 12
      quote: Conduction aphasia is associated with damage to the posterior segment of the arcuate fasciculus,
        Heschl's gyrus, and optical tracts.
  - id: f2
    target: left_heschls_gyrus
    claim: Damage to the left Heschl's gyrus contributes to conduction aphasia classification (predictive
      relevance Z = 1.47).
    strength: moderate
    confidence: high
    flags:
    - cohort overlaps with @Fridriksson2018 (same USC registry); flag for downstream double-counting risk
      in interpret_overlap().
    claim_quotes:
    - page: 12
      quote: Conduction aphasia is associated with damage to the posterior segment of the arcuate fasciculus,
        Heschl's gyrus, and optical tracts.
  - id: f3
    target: left_optic_radiations
    claim: Damage to the left optic radiations contributes to conduction aphasia classification (predictive
      relevance Z = 1.14).
    strength: weak
    confidence: high
    flags:
    - cohort overlaps with @Fridriksson2018 (same USC registry); flag for downstream double-counting risk
      in interpret_overlap().
    - optic radiations are not a canonical language tract; this finding likely reflects spatial overlap
      with the temporal-stem lesion pattern of conduction aphasia rather than a functional contribution
      to language.
    claim_quotes:
    - page: 12
      quote: Conduction aphasia is associated with damage to the posterior segment of the arcuate fasciculus,
        Heschl's gyrus, and optical tracts.
  verdict: approve
  rationale: >
    All three claim quotes directly name the targeted regions; the source passages in the full draft
    include a Discussion passage that explicitly confirms the same three structures (p.13), providing
    independent corroboration. Strength/confidence ratings are well-calibrated: strong for Z=2.48
    (top predictor), moderate for Z=1.47, and weak for f3 (Z=1.14, just above threshold, non-canonical
    language tract). The f3 weak rating is correct and intentional — the SFT failure is a
    bookkeeping trigger, not a substantive content problem. The cohort-overlap flag is a routine
    provenance concern handled in interpret_overlap(), not a blocker for promotion.
  per_finding:
  - id: f3
    concern: >
      weak rating is correct: Z=1.14 is marginal, the author limitation explicitly notes optic
      radiations are not a canonical language structure, and the Discussion attributes the finding
      to spatial adjacency rather than a functional language contribution. Do not upgrade strength
      when promoting.
    supports_approval: true
