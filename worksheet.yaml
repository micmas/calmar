    (2) The factor captures non-language cognition (fluid reasoning via Raven's, rule-anticipation
    via Brixton) rather than language per se, which may be out of scope for this KB. The weak
    strength ratings are correctly calibrated and the cluster does survive lesion-volume control
    at the relaxed threshold, but the question of whether below-standard-threshold, non-language
    findings merit promotion is a policy call, not an extraction call.
  per_finding: null
