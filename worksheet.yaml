  verdict: agree_defer
  rationale: >
    The extraction quality is accurate — all claim quotes name the targeted regions and the
    paper's Discussion (p.12) explicitly confirms the findings are consistent with the
    classical Wernicke's-area literature. However, the deferral is genuinely warranted on
    substantive grounds: the entire Wernicke's subgroup is n=7, which the authors themselves
    acknowledge as a limitation, explicitly attributing the temporal-pole and putamen findings
    to possible sample idiosyncrasies. Confidence=medium for all findings is correctly
    calibrated given this small n, and the SFT rule all_findings_confidence_high correctly
    flags this for human review. The human reviewer should decide: (1) whether to promote
    findings from an n=7 subgroup at medium confidence, and (2) whether f1 (angular gyrus
    as strongest predictor, not STG) needs commentary given its departure from the classical
    Wernicke's anatomy, and (3) whether f4/f7 (pallidum/putamen) should be included or
    excluded given they are non-specific to Wernicke's and author-flagged as potentially
    idiosyncratic.
