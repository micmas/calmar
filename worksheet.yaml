      and may reflect the small n=7 driving an idiosyncratic lesion profile. The Discussion
      does not directly address this inversion. Worth noting in the KB entry.
    supports_approval: false
  - id: f3
    concern: >
      Authors explicitly flag temporal-pole + putamen as possibly idiosyncratic (p.13). f3
      weak + medium is correct. Human reviewer may wish to exclude this finding entirely
      rather than promote at weak/medium.
    supports_approval: false
  - id: f4
    concern: >
      Pallidum (globus pallidus) is a non-specific predictor also appearing in global aphasia;
      the finding is weak/medium and not in the classical Wernicke's circuit. Recommend
      human reviewer consider excluding.
    supports_approval: false
  - id: f7
    concern: >
      Putamen, author-flagged as idiosyncratic for Wernicke's (n=7). Same exclusion
      consideration as f3/f4.
    supports_approval: false
